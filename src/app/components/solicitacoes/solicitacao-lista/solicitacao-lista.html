@if (service.loading()) {
  <p>Carregando...</p>
} @else {
  @if (service.solicitacoes().length === 0) {
    <p>Nenhuma solicitação encontrada.</p>
  } @else {
    <div class="lista">
      @for (solicitacao of service.solicitacoes(); track $index) {
        <app-solicitacao-item [solicitacao]="solicitacao" />
      }
    </div>
  }
}
